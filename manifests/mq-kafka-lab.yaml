apiVersion: v1
kind: Namespace
metadata:
  name: mq-kafka-lab
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-headless
  namespace: mq-kafka-lab
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: kafka
  ports:
    - name: kafka
      port: 9092
    - name: controller
      port: 9093
---
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: mq-kafka-lab
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: kafka
  ports:
    - name: kafka
      port: 9092
      targetPort: kafka
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: kafka-config
  namespace: mq-kafka-lab
data:
  cluster.id: MkU3OEVBNTcwNTJENDM2Qk
  server.properties: |
    node.id=1
    process.roles=broker,controller
    controller.quorum.voters=1@kafka-0.kafka-headless.mq-kafka-lab.svc.cluster.local:9093
    controller.listener.names=CONTROLLER

    listeners=PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
    advertised.listeners=PLAINTEXT://kafka:9092
    listener.security.protocol.map=PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
    inter.broker.listener.name=PLAINTEXT

    log.dirs=/var/lib/kafka/data
    auto.create.topics.enable=true
    offsets.topic.replication.factor=1
    transaction.state.log.replication.factor=1
    transaction.state.log.min.isr=1
    group.initial.rebalance.delay.ms=0
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka
  namespace: mq-kafka-lab
spec:
  serviceName: kafka-headless
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kafka
  template:
    metadata:
      annotations:
        mq-kafka-lab/config-revision: "1"
      labels:
        app.kubernetes.io/name: kafka
        app.kubernetes.io/part-of: mq-kafka-lab
    spec:
      enableServiceLinks: false
      initContainers:
        - name: format-kraft-storage
          image: confluentinc/cp-kafka:7.7.1
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -ec
            - |
              kafka-storage format \
                --ignore-formatted \
                --cluster-id "$(cat /etc/kafka-config/cluster.id)" \
                --config /etc/kafka-config/server.properties
          volumeMounts:
            - name: config
              mountPath: /etc/kafka-config
              readOnly: true
            - name: data
              mountPath: /var/lib/kafka/data
      containers:
        - name: kafka
          image: confluentinc/cp-kafka:7.7.1
          imagePullPolicy: IfNotPresent
          command:
            - kafka-server-start
            - /etc/kafka-config/server.properties
          ports:
            - name: kafka
              containerPort: 9092
            - name: controller
              containerPort: 9093
          env:
            - name: KAFKA_HEAP_OPTS
              value: -Xms384m -Xmx384m
          startupProbe:
            tcpSocket:
              port: kafka
            periodSeconds: 10
            failureThreshold: 30
          readinessProbe:
            tcpSocket:
              port: kafka
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: kafka
            periodSeconds: 20
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: config
              mountPath: /etc/kafka-config
              readOnly: true
            - name: data
              mountPath: /var/lib/kafka/data
      volumes:
        - name: config
          configMap:
            name: kafka-config
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 5Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mq-kafka-integration-service-config
  namespace: mq-kafka-lab
data:
  SPRING_PROFILES_ACTIVE: dev
  LOG_LEVEL: INFO
  DB_URL: jdbc:postgresql://postgres:5432/mq_kafka
  DB_USERNAME: mq_kafka
  DB_DRIVER: org.postgresql.Driver
  KAFKA_BOOTSTRAP_SERVERS: kafka:9092
  KAFKA_CONSUMER_GROUP_ID: mq-kafka-integration-service
  IBM_MQ_CONN_NAME: mq-not-installed(1414)
  MANAGEMENT_TRACING_ENABLED: "false"
  DEBUG_KAFKA_PUBLISHER_ENABLED: "true"
---
apiVersion: v1
kind: Secret
metadata:
  name: mq-kafka-lab-secret
  namespace: mq-kafka-lab
type: Opaque
stringData:
  POSTGRES_PASSWORD: mq-kafka-lab-change-me
  DB_PASSWORD: mq-kafka-lab-change-me
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: mq-kafka-lab
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: mq-kafka-lab
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres
        app.kubernetes.io/part-of: mq-kafka-lab
    spec:
      enableServiceLinks: false
      containers:
        - name: postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: mq_kafka
            - name: POSTGRES_USER
              value: mq_kafka
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mq-kafka-lab-secret
                  key: POSTGRES_PASSWORD
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - mq_kafka
                - -d
                - mq_kafka
            periodSeconds: 5
            failureThreshold: 6
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - mq_kafka
                - -d
                - mq_kafka
            periodSeconds: 10
            failureThreshold: 6
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mq-kafka-integration-service
  namespace: mq-kafka-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mq-kafka-integration-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mq-kafka-integration-service
        app.kubernetes.io/part-of: mq-kafka-lab
    spec:
      enableServiceLinks: false
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: mq-kafka-integration-service
          image: ghcr.io/ov-petrov/mq-kafka-integration-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: mq-kafka-integration-service-config
            - secretRef:
                name: mq-kafka-lab-secret
          startupProbe:
            httpGet:
              path: /livez
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /livez
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: mq-kafka-integration-service
  namespace: mq-kafka-lab
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: mq-kafka-integration-service
  ports:
    - name: http
      port: 8080
      targetPort: http
