apiVersion: v1
kind: Namespace
metadata:
  name: observability
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: observability-quota
  namespace: observability
spec:
  hard:
    pods: "2"
    requests.cpu: 100m
    requests.memory: 128Mi
    requests.ephemeral-storage: 128Mi
    limits.cpu: 300m
    limits.memory: 384Mi
    limits.ephemeral-storage: 512Mi
---
apiVersion: v1
kind: LimitRange
metadata:
  name: observability-defaults
  namespace: observability
spec:
  limits:
    - type: Container
      default:
        cpu: 200m
        memory: 256Mi
        ephemeral-storage: 256Mi
      defaultRequest:
        cpu: 50m
        memory: 64Mi
        ephemeral-storage: 64Mi
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vector
  namespace: observability
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: vector
rules:
  - apiGroups:
      - ""
    resources:
      - namespaces
      - nodes
      - pods
    verbs:
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: vector
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: vector
subjects:
  - kind: ServiceAccount
    name: vector
    namespace: observability
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: vector-config
  namespace: observability
data:
  vector.yaml: |
    data_dir: /var/lib/vector

    sources:
      kubernetes_logs:
        type: kubernetes_logs

    transforms:
      parse_json_message:
        type: remap
        inputs:
          - kubernetes_logs
        source: |
          parsed, err = parse_json(.message)
          if err == null && is_object(parsed) {
            . = merge!(., parsed)
          }

    sinks:
      elasticsearch:
        type: elasticsearch
        inputs:
          - parse_json_message
        endpoints:
          - "${ELASTICSEARCH_ENDPOINT}"
        mode: bulk
        bulk:
          index: "k3s-logs-%Y.%m.%d"
        auth:
          strategy: basic
          user: "${ELASTICSEARCH_USERNAME}"
          password: "${ELASTICSEARCH_PASSWORD}"
        tls:
          verify_certificate: true
          verify_hostname: true
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: vector
  namespace: observability
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: vector
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vector
        app.kubernetes.io/component: log-collector
        vector.dev/exclude: "true"
    spec:
      serviceAccountName: vector
      enableServiceLinks: false
      containers:
        - name: vector
          image: timberio/vector:0.49.0-debian
          imagePullPolicy: IfNotPresent
          args:
            - --config
            - /etc/vector/vector.yaml
          envFrom:
            - secretRef:
                name: vector-elasticsearch
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
              ephemeral-storage: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
              ephemeral-storage: 256Mi
          volumeMounts:
            - name: config
              mountPath: /etc/vector
              readOnly: true
            - name: data
              mountPath: /var/lib/vector
            - name: pod-logs
              mountPath: /var/log/pods
              readOnly: true
      tolerations:
        - operator: Exists
      volumes:
        - name: config
          configMap:
            name: vector-config
        - name: data
          hostPath:
            path: /var/lib/vector
            type: DirectoryOrCreate
        - name: pod-logs
          hostPath:
            path: /var/log/pods
            type: Directory
